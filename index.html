<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Processing System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="Calc.html">Calculator</a>
    <a href="inv.html">Inventory</a>
    <a href="resources.html">Resources</a>
  </div>

  <div class="navbar-right">
    <!-- Dark Mode Toggle -->
    <button id="themeToggle" class="theme-toggle-btn">
      🌙
    </button>

    <!-- User Profile -->
    <div class="user-profile" id="userProfile">
      <div class="user-avatar-container">
        <img id="userAvatar" 
             class="user-avatar" 
             alt="User avatar" 
             width="38" 
             height="38"
             src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=128">
        <div class="user-info">
          <span id="userName" class="user-name">Loading...</span>
        </div>
      </div>
      
      <button id="logoutBtn" class="logout-btn">
        Logout
      </button>
    </div>
  </div>
</nav>

  <div class="container" style="text-align:center; margin-top:120px;">
    <h1>Batch Processing System</h1>
    <p style="margin:40px 0; font-size:1.25rem;">Choose your tool:</p>
    
    <div style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap;">
      <a href="Calc.html" style="display:block; padding:28px 48px; background:var(--primary); color:white; text-decoration:none; border-radius:12px; font-size:1.35rem; font-weight:600; min-width:280px;">
        Batch Weight Calculator
      </a>
      <a href="inv.html" style="display:block; padding:28px 48px; background:var(--primary); color:white; text-decoration:none; border-radius:12px; font-size:1.35rem; font-weight:600; min-width:280px;">
        Inventory Viewer
      </a>
    </div>
  </div>

  <script src="theme.js"></script>
  <script type="module" src="index.js"></script>
